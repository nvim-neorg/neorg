name: Run tests
on:
  pull_request: ~
  push:
    branches:
      - main

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Install TS CLI
        uses: tree-sitter/setup-action@v2
        with:
          install-lib: false
      - name: Run tests
        uses: nvim-neorocks/nvim-busted-action@v1
        with:
          nvim_version: stable
          luarocks_args: '--server https://lux.lumen-labs.org/rocks-binaries/'
